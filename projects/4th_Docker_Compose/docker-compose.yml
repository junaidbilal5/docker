version: '3.1'

services:

  mysql_container:
    image: mysql:8.0
    container_name: mysql_container_compose
    restart: always
    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase

    ports:
      - "3308:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./MySQL/init.sql:/docker-entrypoint-initdb.d/init.sql


  flask_container:
    build: ./Flask_app
    container_name: flask_container_compose
    restart: always

    depends_on:
      mysql_container:
        condition: service_healthy

    ports:
      - "5001:5000"